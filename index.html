<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Team Psychological Safety</title>
</head>
<body>
    <h1>Team Psychological Safety</h1>
    <form id="survey-form">
        <div class="instructions">
        <p>Please answer the following questions about your team's psychological safety.</p>
        <p>For each statement, please select the option that best reflects your opinion.</p>
        </div>
        <ol id="question-list"></ol>

        <button type="submit">See Results</button>
    </form>

    <p id="sum"></p>

    <script>
        const questions = [
            {
                text: 'If you make a mistake on this team, it is often held against you.',
                scores: [7, 6, 5, 4, 3, 2, 1]
            },
            {
                text: 'Members of this team are able to bring up problems and tough issues.',
                scores: [1, 2, 3, 4, 5, 6, 7]
            },
            {
                text: 'People on this team sometimes reject others for being different.',
                scores: [7, 6, 5, 4, 3, 2, 1]
            },
            {
                text: 'It is safe to take a risk on this team.',
                scores: [1, 2, 3, 4, 5, 6, 7]
            },
            {
                text: 'It is difficult to ask other members of this team for help.',
                scores: [7, 6, 5, 4, 3, 2, 1]
            },
            {
                text: 'No one on this team would deliberately act in a way that undermines my efforts.',
                scores: [1, 2, 3, 4, 5, 6, 7]
            },
            {
                text: 'Working with members of this team, my unique skills and talents are valued and utilized.',
                scores: [1, 2, 3, 4, 5, 6, 7]
            }
        ];

        const optionLabels = ['Strongly Disagree', 'Disagree', 'Slightly Disagree', 'Neutral', 'Slightly Agree', 'Agree', 'Strongly Agree'];
        const form = document.getElementById('survey-form');
        const questionList = document.getElementById('question-list');
        const sumElement = document.getElementById('sum');

        questionList.innerHTML = questions
            .map((question, questionIndex) => {
                const questionNumber = questionIndex + 1;
                const options = question.scores
                    .map((score, optionIndex) => {
                        const optionNumber = optionIndex + 1;
                        const id = `question${questionNumber}-option${optionNumber}`;

                        return `
                            <label for="${id}">
                                <input class="sr-only" type="radio" id="${id}" name="question${questionNumber}" value="${score}">
                                <span class="option-label sr-only">${optionLabels[optionIndex]}</span>
                            </label>
                        `;
                    })
                    .join('');

                return `
                    <li>
                        <fieldset>
                            <legend>${question.text}</legend>
                            <div class="question-options">
                                <div>Disagree</div>
                                <div class="radio-container">
                                ${options}
                                </div>
                                <div>Agree</div>
                            </div>
                        </fieldset>
                    </li>
                `;
            })
            .join('');

        // Enforce sequential answering:
        (function enforceSequential() {
            const fieldsets = Array.from(questionList.querySelectorAll('fieldset'));
            const submitBtn = form.querySelector('button[type="submit"]');
            function updateSubmitState() {
                const allAnswered = fieldsets.every(fs => {
                    const firstInput = fs.querySelector('input[type="radio"]');
                    if (!firstInput) return false;
                    return !!form.querySelector(`input[name="${firstInput.name}"]:checked`);
                });
                submitBtn.disabled = !allAnswered;
            }

            fieldsets.forEach((fs, idx) => {
                const inputs = Array.from(fs.querySelectorAll('input[type="radio"]'));
                if (idx > 0) {
                    inputs.forEach(i => {
                        i.disabled = true;
                    });
                    fs.classList.add('disabled');
                }
                inputs.forEach(i => i.addEventListener('change', () => {
                    // enable next fieldset when current has any selection
                    const name = i.name;
                    if (form.querySelector(`input[name="${name}"]:checked`)) {
                        const next = fieldsets[idx + 1];
                        if (next) {
                            next.classList.remove('disabled');
                            Array.from(next.querySelectorAll('input[type="radio"]')).forEach(inp => inp.disabled = false);
                            // scroll next into view and focus first input for keyboard users
                            next.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            const first = next.querySelector('input[type="radio"]');
                            if (first) first.focus();
                        }
                    }
                    updateSubmitState();
                }));
            });

            // initialize submit state
            updateSubmitState();
        })();

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            let total = 0;
            const formData = new FormData(form);

            for (const value of formData.values()) {
                total += parseInt(value, 10);
            }

            sumElement.textContent = 'Total: ' + total + ' out of 49 (' + ((total / 49) * 100).toFixed(2) + '%)';
        });
    </script>
</body>
</html>
